services:
  postgres:
    image:
      postgres:17
    environment:
      - POSTGRES_DB=homeworkdb
      - POSTGRES_USER=taskuser
      - POSTGRES_PASSWORD=mypassword
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: